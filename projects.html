<!DOCTYPE html>
<html lang="de" data-i18n-document-title="meta.documentTitle.projects">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link rel="stylesheet" href="style2.css" />
  </head>
  <body>
    <a class="skip-link" href="#main" data-i18n="common.skipToContent"></a>

    <header class="site-header">
      <div class="site-header__inner">
        <p class="site-title">
          <a href="index.html" data-i18n="meta.siteTitle"></a>
        </p>
        <nav
          class="site-nav"
          data-i18n-attr="nav.ariaMain"
          data-i18n-attr-name="aria-label"
          aria-label=""
        >
          <ul class="site-nav__list">
            <li><a href="index.html" data-i18n="nav.home"></a></li>
            <li>
              <a href="projects.html" aria-current="page" data-i18n="nav.projects"></a>
            </li>
            <li><a href="about.html" data-i18n="nav.about"></a></li>
            <li><a href="kontakt.html" data-i18n="nav.contact"></a></li>
          </ul>
          <div
            class="lang-switch"
            role="group"
            data-i18n-attr="nav.langLabel"
            data-i18n-attr-name="aria-label"
            aria-label=""
          >
            <button type="button" data-set-lang="de" aria-pressed="false" data-i18n="nav.langDe"></button>
            <span aria-hidden="true">|</span>
            <button type="button" data-set-lang="en" aria-pressed="false" data-i18n="nav.langEn"></button>
          </div>
        </nav>
      </div>
    </header>

    <main id="main">
      <p class="issue-line reveal" data-i18n="common.kickerLine"></p>
      <h1 class="page-title reveal" data-i18n="projectsPage.title"></h1>
      <p class="lede reveal" data-i18n="projectsPage.intro"></p>

      <section
        class="section tag-filter-section"
        data-i18n-attr="projectsPage.filterHeading"
        data-i18n-attr-name="aria-label"
        aria-label=""
      >
        <div class="tag-filter reveal" data-project-tag-filter aria-label="">
          <p class="tag-filter__label" data-i18n="projectsPage.filterLabel"></p>
          <div class="tag-filter__controls" role="group" data-i18n-attr="projectsPage.filterAria" data-i18n-attr-name="aria-label" aria-label="">
            <!-- buttons inserted by script.js -->
          </div>
        </div>
      </section>

      <section class="section" aria-labelledby="cards-heading">
        <h2 id="cards-heading" class="reveal" data-i18n="projectsPage.cardsHeading"></h2>
        <div class="divider reveal" aria-hidden="true"></div>
        <div
          class="teaser-list teaser-list--grid reveal"
          data-project-list
          data-project-hide-github
          aria-live="polite"
        ></div>
        <p class="tag-filter__empty reveal" data-project-empty hidden data-i18n="projectsPage.filterEmpty"></p>
      </section>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <p data-i18n="footer.note"></p>
        <p class="site-footer__legal">
          <a href="impressum.html" data-i18n="footer.impressumLink"></a>
        </p>
      </div>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
