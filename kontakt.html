<!DOCTYPE html>
<html lang="de" data-i18n-document-title="meta.documentTitle.contact">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=Karla:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style2.css" />
  </head>
  <body>
    <a class="skip-link" href="#main" data-i18n="common.skipToContent"></a>

    <header class="site-header">
      <div class="site-header__inner">
        <p class="site-title">
          <a href="index.html" data-i18n="meta.siteTitle"></a>
        </p>
        <nav
          class="site-nav"
          data-i18n-attr="nav.ariaMain"
          data-i18n-attr-name="aria-label"
          aria-label=""
        >
          <ul class="site-nav__list">
            <li><a href="index.html" data-i18n="nav.home"></a></li>
            <li><a href="projects.html" data-i18n="nav.projects"></a></li>
            <li><a href="about.html" data-i18n="nav.about"></a></li>
            <li>
              <a href="kontakt.html" aria-current="page" data-i18n="nav.contact"></a>
            </li>
          </ul>
          <div
            class="lang-switch"
            role="group"
            data-i18n-attr="nav.langLabel"
            data-i18n-attr-name="aria-label"
            aria-label=""
          >
            <button type="button" data-set-lang="de" aria-pressed="false" data-i18n="nav.langDe"></button>
            <span aria-hidden="true">|</span>
            <button type="button" data-set-lang="en" aria-pressed="false" data-i18n="nav.langEn"></button>
          </div>
        </nav>
      </div>
    </header>

    <main id="main">
      <h1 class="page-title" data-i18n="contactPage.title"></h1>
      <p class="lede" data-i18n="contactPage.intro"></p>

      <section class="section contact-block" aria-labelledby="contact-channels">
        <h2 id="contact-channels" data-i18n="contactPage.title"></h2>
        <p class="impressum-lines">
          <strong data-i18n="contactPage.emailLabel"></strong><br />
          <a
            data-i18n="contactPage.emailText"
            data-email-link
            href="#"
          ></a>
          <span hidden data-i18n="contactPage.emailUser" data-email-user></span>
          <span hidden data-i18n="contactPage.emailDomain" data-email-domain></span>
        </p>
        <p class="impressum-lines">
          <strong data-i18n="contactPage.githubLabel"></strong><br />
          <a
            href=""
            data-i18n-attr="contactPage.githubHref"
            data-i18n-attr-name="href"
            target="_blank"
            rel="noopener noreferrer"
            data-i18n="contactPage.githubText"
          ></a>
        </p>
        <p class="impressum-lines">
          <strong data-i18n="contactPage.linkedinLabel"></strong><br />
          <a
            href=""
            data-i18n-attr="contactPage.linkedinHref"
            data-i18n-attr-name="href"
            target="_blank"
            rel="noopener noreferrer"
            data-i18n="contactPage.linkedinText"
          ></a>
        </p>
      </section>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <p data-i18n="footer.note"></p>
        <p class="site-footer__legal">
          <a href="impressum.html" data-i18n="footer.impressumLink"></a>
        </p>
      </div>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
