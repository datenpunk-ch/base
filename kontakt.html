<!DOCTYPE html>
<html lang="de" data-i18n-document-title="meta.documentTitle.contact">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link rel="stylesheet" href="style2.css" />
  </head>
  <body class="contact">
    <a class="skip-link" href="#main" data-i18n="common.skipToContent"></a>

    <header class="site-header">
      <div class="site-header__inner">
        <p class="site-title">
          <a href="index.html" data-i18n="meta.siteTitle"></a>
        </p>
        <nav
          class="site-nav"
          data-i18n-attr="nav.ariaMain"
          data-i18n-attr-name="aria-label"
          aria-label=""
        >
          <ul class="site-nav__list">
            <li><a href="index.html" data-i18n="nav.home"></a></li>
            <li><a href="projects.html" data-i18n="nav.projects"></a></li>
            <li><a href="about.html" data-i18n="nav.about"></a></li>
            <li>
              <a href="kontakt.html" aria-current="page" data-i18n="nav.contact"></a>
            </li>
          </ul>
          <div
            class="lang-switch"
            role="group"
            data-i18n-attr="nav.langLabel"
            data-i18n-attr-name="aria-label"
            aria-label=""
          >
            <button type="button" data-set-lang="de" aria-pressed="false" data-i18n="nav.langDe"></button>
            <span aria-hidden="true">|</span>
            <button type="button" data-set-lang="en" aria-pressed="false" data-i18n="nav.langEn"></button>
          </div>
        </nav>
      </div>
    </header>

    <main id="main">
      <h1 class="page-title reveal" data-i18n="contactPage.title"></h1>
      <p class="lede reveal" data-i18n="contactPage.intro"></p>

      <section class="article-section" aria-labelledby="contact-email">
        <h2 id="contact-email" class="reveal" data-i18n="contactPage.emailLabel"></h2>
        <ul class="project-bullets reveal">
          <li>
            <a data-i18n="contactPage.emailText" data-email-link href="#"></a>
            <span hidden data-i18n="contactPage.emailUser" data-email-user></span>
            <span hidden data-i18n="contactPage.emailDomain" data-email-domain></span>
          </li>
        </ul>
      </section>

      <section class="article-section" aria-labelledby="contact-github">
        <h2 id="contact-github" class="reveal" data-i18n="contactPage.githubLabel"></h2>
        <ul class="project-bullets reveal">
          <li>
            <a
              href=""
              data-i18n-attr="contactPage.githubHref"
              data-i18n-attr-name="href"
              target="_blank"
              rel="noopener noreferrer"
              data-i18n="contactPage.githubText"
            ></a>
          </li>
        </ul>
      </section>

      <section class="article-section" aria-labelledby="contact-linkedin">
        <h2 id="contact-linkedin" class="reveal" data-i18n="contactPage.linkedinLabel"></h2>
        <ul class="project-bullets reveal">
          <li>
            <a
              href=""
              data-i18n-attr="contactPage.linkedinHref"
              data-i18n-attr-name="href"
              target="_blank"
              rel="noopener noreferrer"
              data-i18n="contactPage.linkedinText"
            ></a>
          </li>
        </ul>
      </section>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <p data-i18n="footer.note"></p>
        <p class="site-footer__legal">
          <a href="impressum.html" data-i18n="footer.impressumLink"></a>
        </p>
      </div>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
