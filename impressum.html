<!DOCTYPE html>
<html lang="de" data-i18n-document-title="meta.documentTitle.impressum">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=Karla:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style2.css" />
  </head>
  <body>
    <a class="skip-link" href="#main" data-i18n="common.skipToContent"></a>

    <header class="site-header">
      <div class="site-header__inner">
        <p class="site-title">
          <a href="index.html" data-i18n="meta.siteTitle"></a>
        </p>
        <nav
          class="site-nav"
          data-i18n-attr="nav.ariaMain"
          data-i18n-attr-name="aria-label"
          aria-label=""
        >
          <ul class="site-nav__list">
            <li><a href="index.html" data-i18n="nav.home"></a></li>
            <li><a href="projects.html" data-i18n="nav.projects"></a></li>
            <li><a href="about.html" data-i18n="nav.about"></a></li>
            <li><a href="kontakt.html" data-i18n="nav.contact"></a></li>
          </ul>
          <div
            class="lang-switch"
            role="group"
            data-i18n-attr="nav.langLabel"
            data-i18n-attr-name="aria-label"
            aria-label=""
          >
            <button type="button" data-set-lang="de" aria-pressed="false" data-i18n="nav.langDe"></button>
            <span aria-hidden="true">|</span>
            <button type="button" data-set-lang="en" aria-pressed="false" data-i18n="nav.langEn"></button>
          </div>
        </nav>
      </div>
    </header>

    <main id="main">
      <h1 class="page-title" data-i18n="impressumPage.title"></h1>
      <p class="standfirst" data-i18n="impressumPage.lead"></p>

      <section class="article-section" aria-labelledby="imp-provider">
        <h2 id="imp-provider" data-i18n="impressumPage.providerHeading"></h2>
        <p class="impressum-lines" data-i18n="impressumPage.providerBody"></p>
      </section>

      <section class="article-section" aria-labelledby="imp-contact">
        <h2 id="imp-contact" data-i18n="impressumPage.contactHeading"></h2>
        <p class="impressum-lines" data-i18n="impressumPage.contactBody"></p>
      </section>

      <section class="article-section" aria-labelledby="imp-content">
        <h2 id="imp-content" data-i18n="impressumPage.contentHeading"></h2>
        <p data-i18n="impressumPage.contentBody"></p>
      </section>

      <section class="article-section" aria-labelledby="imp-liability-content">
        <h2 id="imp-liability-content" data-i18n="impressumPage.liabilityContentHeading"></h2>
        <p data-i18n="impressumPage.liabilityContentBody"></p>
      </section>

      <section class="article-section" aria-labelledby="imp-liability">
        <h2 id="imp-liability" data-i18n="impressumPage.liabilityLinksHeading"></h2>
        <p data-i18n="impressumPage.liabilityLinksBody"></p>
      </section>

      <section class="article-section" aria-labelledby="imp-copyright">
        <h2 id="imp-copyright" data-i18n="impressumPage.copyrightHeading"></h2>
        <p data-i18n="impressumPage.copyrightBody"></p>
      </section>

      <section class="article-section" aria-labelledby="imp-hosting">
        <h2 id="imp-hosting" data-i18n="impressumPage.hostingHeading"></h2>
        <p data-i18n="impressumPage.hostingBody"></p>
      </section>

      <p class="back-nav">
        <a href="index.html" data-i18n="impressumPage.backHome"></a>
      </p>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <p data-i18n="footer.note"></p>
        <p class="site-footer__legal">
          <a href="impressum.html" data-i18n="footer.impressumLink"></a>
        </p>
      </div>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
