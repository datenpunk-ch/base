<!DOCTYPE html>
<html lang="de" data-i18n-document-title="meta.documentTitle.impressum">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link rel="stylesheet" href="style2.css" />
  </head>
  <body>
    <a class="skip-link" href="#main" data-i18n="common.skipToContent"></a>

    <header class="site-header">
      <div class="site-header__inner">
        <p class="site-title">
          <a href="index.html" data-i18n="meta.siteTitle"></a>
        </p>
        <nav
          class="site-nav"
          data-i18n-attr="nav.ariaMain"
          data-i18n-attr-name="aria-label"
          aria-label=""
        >
          <ul class="site-nav__list">
            <li><a href="index.html" data-i18n="nav.home"></a></li>
            <li><a href="projects.html" data-i18n="nav.projects"></a></li>
            <li><a href="about.html" data-i18n="nav.about"></a></li>
            <li><a href="kontakt.html" data-i18n="nav.contact"></a></li>
          </ul>
          <div
            class="lang-switch"
            role="group"
            data-i18n-attr="nav.langLabel"
            data-i18n-attr-name="aria-label"
            aria-label=""
          >
            <button type="button" data-set-lang="de" aria-pressed="false" data-i18n="nav.langDe"></button>
            <span aria-hidden="true">|</span>
            <button type="button" data-set-lang="en" aria-pressed="false" data-i18n="nav.langEn"></button>
          </div>
        </nav>
      </div>
    </header>

    <main id="main">
      <h1 class="page-title reveal" data-i18n="impressumPage.title"></h1>
      <p class="standfirst reveal" data-i18n="impressumPage.lead"></p>

      <section class="article-section" aria-labelledby="imp-provider">
        <h2 id="imp-provider" class="reveal" data-i18n="impressumPage.providerHeading"></h2>
        <p class="impressum-lines reveal" data-i18n="impressumPage.providerBody"></p>
      </section>

      <section class="article-section" aria-labelledby="imp-contact">
        <h2 id="imp-contact" class="reveal" data-i18n="impressumPage.contactHeading"></h2>
        <p class="impressum-lines reveal" data-i18n="impressumPage.contactBody"></p>
      </section>

      <section class="article-section" aria-labelledby="imp-liability">
        <h2
          id="imp-liability"
          class="reveal"
          data-i18n="impressumPage.liabilityHeading"
        ></h2>
        <p class="reveal" data-i18n="impressumPage.liabilityBody"></p>
      </section>

      <section class="article-section" aria-labelledby="imp-copyright">
        <h2 id="imp-copyright" class="reveal" data-i18n="impressumPage.copyrightHeading"></h2>
        <p class="reveal" data-i18n="impressumPage.copyrightBody"></p>
      </section>

      <section class="article-section" aria-labelledby="imp-privacy">
        <h2 id="imp-privacy" class="reveal" data-i18n="impressumPage.privacyHeading"></h2>
      </section>

      <section class="article-section" aria-labelledby="imp-privacy-controller">
        <h3
          id="imp-privacy-controller"
          class="reveal"
          data-i18n="impressumPage.privacyControllerHeading"
        ></h3>
        <p class="reveal" data-i18n="impressumPage.privacyControllerBody"></p>
      </section>

      <section class="article-section" aria-labelledby="imp-privacy-hosting">
        <h3
          id="imp-privacy-hosting"
          class="reveal"
          data-i18n="impressumPage.privacyHostingHeading"
        ></h3>
        <p class="reveal" data-i18n="impressumPage.privacyHostingBody"></p>
      </section>

      <section class="article-section" aria-labelledby="imp-privacy-local">
        <h3
          id="imp-privacy-local"
          class="reveal"
          data-i18n="impressumPage.privacyLocalHeading"
        ></h3>
        <p class="reveal" data-i18n="impressumPage.privacyLocalBody"></p>
      </section>

      <section class="article-section" aria-labelledby="imp-privacy-rights">
        <h3
          id="imp-privacy-rights"
          class="reveal"
          data-i18n="impressumPage.privacyRightsHeading"
        ></h3>
        <p class="reveal" data-i18n="impressumPage.privacyRightsBody"></p>
      </section>

      <p class="back-nav reveal">
        <a href="index.html" data-i18n="impressumPage.backHome"></a>
      </p>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <p data-i18n="footer.note"></p>
        <p class="site-footer__legal">
          <a href="impressum.html" data-i18n="footer.impressumLink"></a>
        </p>
      </div>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
