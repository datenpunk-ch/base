<!DOCTYPE html>
<html lang="de" data-i18n-document-title="meta.documentTitle.project1">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link rel="stylesheet" href="style2.css" />
  </head>
  <body>
    <a class="skip-link" href="#main" data-i18n="common.skipToContent"></a>

    <header class="site-header">
      <div class="site-header__inner">
        <p class="site-title">
          <a href="index.html" data-i18n="meta.siteTitle"></a>
        </p>
        <nav
          class="site-nav"
          data-i18n-attr="nav.ariaMain"
          data-i18n-attr-name="aria-label"
          aria-label=""
        >
          <ul class="site-nav__list">
            <li><a href="index.html" data-i18n="nav.home"></a></li>
            <li>
              <a href="projects.html" aria-current="page" data-i18n="nav.projects"></a>
            </li>
            <li><a href="about.html" data-i18n="nav.about"></a></li>
            <li><a href="kontakt.html" data-i18n="nav.contact"></a></li>
          </ul>
          <div
            class="lang-switch"
            role="group"
            data-i18n-attr="nav.langLabel"
            data-i18n-attr-name="aria-label"
            aria-label=""
          >
            <button type="button" data-set-lang="de" aria-pressed="false" data-i18n="nav.langDe"></button>
            <span aria-hidden="true">|</span>
            <button type="button" data-set-lang="en" aria-pressed="false" data-i18n="nav.langEn"></button>
          </div>
        </nav>
      </div>
    </header>

    <main id="main" class="main--project">
      <article>
        <section class="article-section article-section--wide" aria-labelledby="sec-embed">
          <a class="embed-jump reveal" href="#sec-q">↓ Projekt Beschreibung</a>
          <div class="embed-frame">
            <iframe
              src=""
              data-i18n-attr="project1.embedUrl"
              data-i18n-attr-name="src"
              data-i18n-attr-2="project1.embedTitle"
              data-i18n-attr-name-2="title"
              scrolling="yes"
              loading="lazy"
              referrerpolicy="no-referrer"
              allowfullscreen
            ></iframe>
          </div>
        </section>

        <div class="article-divider article-divider--double reveal" aria-hidden="true"></div>

        <section id="project-description" class="article-section" aria-labelledby="sec-q">
          <h2 id="sec-q" class="reveal" data-i18n="project1.sections.question.heading"></h2>
          <ul class="teaser__tags tool-tags reveal" aria-label="Tool tags">
            <li class="teaser__tag" data-i18n="project1.techTags.python"></li>
            <li class="teaser__tag" data-i18n="project1.techTags.playwright"></li>
            <li class="teaser__tag" data-i18n="project1.techTags.nominatim"></li>
            <li class="teaser__tag" data-i18n="project1.techTags.streamlit"></li>
            <li class="teaser__tag" data-i18n="project1.techTags.ghPages"></li>
            <li class="teaser__tag" data-i18n="project1.techTags.web"></li>
          </ul>

          <p class="reveal" data-i18n="project1.sections.question.body"></p>

          <div class="article-meta reveal" aria-label="Project links">
            <a
              class="article-meta__link"
              href=""
              data-i18n-attr="project1.embedUrl"
              data-i18n-attr-name="href"
              target="_blank"
              rel="noopener noreferrer"
              data-i18n="project1.embedOpenLabel"
            ></a>
            <a
              class="article-meta__link"
              href=""
              data-i18n-attr="project1.githubHref"
              data-i18n-attr-name="href"
              target="_blank"
              rel="noopener noreferrer"
              data-i18n="project1.githubLinkLabel"
            ></a>
          </div>
        </section>

        <section class="article-section" aria-labelledby="sec-d">
          <h2 id="sec-d" class="reveal" data-i18n="project1.sections.data.heading"></h2>
          <ul class="project-bullets reveal">
            <li data-i18n="project1.sections.data.bullets[0]"></li>
            <li data-i18n="project1.sections.data.bullets[1]"></li>
            <li data-i18n="project1.sections.data.bullets[2]"></li>
          </ul>
        </section>

        <section class="article-section" aria-labelledby="sec-m">
          <h2 id="sec-m" class="reveal" data-i18n="project1.sections.method.heading"></h2>
          <ul class="project-bullets reveal">
            <li data-i18n="project1.sections.method.bullets[0]"></li>
            <li data-i18n="project1.sections.method.bullets[1]"></li>
            <li data-i18n="project1.sections.method.bullets[2]"></li>
            <li data-i18n="project1.sections.method.bullets[3]"></li>
          </ul>
        </section>

        <section class="article-section" aria-labelledby="sec-c">
          <h2 id="sec-c" class="reveal" data-i18n="project1.sections.conclusion.heading"></h2>
          <div class="tech-stack reveal" role="region" aria-labelledby="sec-c">
            <ul class="tech-bullets">
              <li data-i18n="project1.techBullets.python"></li>
              <li data-i18n="project1.techBullets.playwright"></li>
              <li data-i18n="project1.techBullets.geocoding"></li>
              <li data-i18n="project1.techBullets.staticSite"></li>
              <li data-i18n="project1.techBullets.streamlit"></li>
            </ul>
          </div>
        </section>

        <section class="article-section" aria-labelledby="sec-v">
          <h2
            id="sec-v"
            class="reveal"
            data-i18n="project1.sections.visualisation.heading"
          ></h2>
          <ul class="project-bullets reveal">
            <li data-i18n="project1.sections.visualisation.bullets[0]"></li>
            <li data-i18n="project1.sections.visualisation.bullets[1]"></li>
            <li data-i18n="project1.sections.visualisation.bullets[2]"></li>
          </ul>
        </section>

        <p class="back-nav reveal">
          <a href="projects.html" data-i18n="project1.backLink"></a>
        </p>
      </article>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <p data-i18n="footer.note"></p>
        <p class="site-footer__legal">
          <a href="impressum.html" data-i18n="footer.impressumLink"></a>
        </p>
      </div>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
