<!DOCTYPE html>
<html lang="de" data-i18n-document-title="meta.documentTitle.project1">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&family=Karla:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Spectral:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style2.css" />
  </head>
  <body>
    <a class="skip-link" href="#main" data-i18n="common.skipToContent"></a>

    <header class="site-header">
      <div class="site-header__inner">
        <p class="site-title">
          <a href="index.html" data-i18n="meta.siteTitle"></a>
        </p>
        <nav
          class="site-nav"
          data-i18n-attr="nav.ariaMain"
          data-i18n-attr-name="aria-label"
          aria-label=""
        >
          <ul class="site-nav__list">
            <li><a href="index.html" data-i18n="nav.home"></a></li>
            <li>
              <a href="projects.html" aria-current="page" data-i18n="nav.projects"></a>
            </li>
            <li><a href="about.html" data-i18n="nav.about"></a></li>
          </ul>
          <div
            class="lang-switch"
            role="group"
            data-i18n-attr="nav.langLabel"
            data-i18n-attr-name="aria-label"
            aria-label=""
          >
            <button type="button" data-set-lang="de" aria-pressed="false" data-i18n="nav.langDe"></button>
            <span aria-hidden="true">|</span>
            <button type="button" data-set-lang="en" aria-pressed="false" data-i18n="nav.langEn"></button>
          </div>
        </nav>
      </div>
    </header>

    <main id="main">
      <article>
        <header>
          <h1 class="page-title" data-i18n="project1.title"></h1>
          <p class="standfirst" data-i18n="project1.standfirst"></p>
          <p class="project-github">
            <a
              href=""
              data-i18n-attr="project1.githubHref"
              data-i18n-attr-name="href"
              rel="noopener noreferrer"
              target="_blank"
              data-i18n="project1.githubLinkLabel"
            ></a>
          </p>
        </header>

        <figure class="figure-placeholder">
          <p data-i18n="project1.imageCaption"></p>
        </figure>

        <section class="article-section" aria-labelledby="sec-q">
          <h2 id="sec-q" data-i18n="project1.sections.question.heading"></h2>
          <p data-i18n="project1.sections.question.body"></p>
        </section>

        <section class="article-section" aria-labelledby="sec-d">
          <h2 id="sec-d" data-i18n="project1.sections.data.heading"></h2>
          <p data-i18n="project1.sections.data.body"></p>
        </section>

        <section class="article-section" aria-labelledby="sec-m">
          <h2 id="sec-m" data-i18n="project1.sections.method.heading"></h2>
          <p data-i18n="project1.sections.method.body"></p>
        </section>

        <section class="article-section" aria-labelledby="sec-v">
          <h2 id="sec-v" data-i18n="project1.sections.visualisation.heading"></h2>
          <p data-i18n="project1.sections.visualisation.body"></p>
        </section>

        <section class="article-section" aria-labelledby="sec-c">
          <h2 id="sec-c" data-i18n="project1.sections.conclusion.heading"></h2>
          <p data-i18n="project1.sections.conclusion.body"></p>
        </section>

        <p class="back-nav">
          <a href="projects.html" data-i18n="project1.backLink"></a>
        </p>
      </article>
    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <p data-i18n="footer.note"></p>
        <p class="site-footer__legal">
          <a href="impressum.html" data-i18n="footer.impressumLink"></a>
        </p>
      </div>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
