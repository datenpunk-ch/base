<!DOCTYPE html>
<html lang="de" data-i18n-document-title="meta.documentTitle.about">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <link rel="stylesheet" href="style2.css" />
  </head>
  <body>
    <a class="skip-link" href="#main" data-i18n="common.skipToContent"></a>

    <header class="site-header">
      <div class="site-header__inner">
        <p class="site-title">
          <a href="index.html" data-i18n="meta.siteTitle"></a>
        </p>
        <nav
          class="site-nav"
          data-i18n-attr="nav.ariaMain"
          data-i18n-attr-name="aria-label"
          aria-label=""
        >
          <ul class="site-nav__list">
            <li><a href="index.html" data-i18n="nav.home"></a></li>
            <li><a href="projects.html" data-i18n="nav.projects"></a></li>
            <li>
              <a href="about.html" aria-current="page" data-i18n="nav.about"></a>
            </li>
            <li><a href="kontakt.html" data-i18n="nav.contact"></a></li>
          </ul>
          <div
            class="lang-switch"
            role="group"
            data-i18n-attr="nav.langLabel"
            data-i18n-attr-name="aria-label"
            aria-label=""
          >
            <button type="button" data-set-lang="de" aria-pressed="false" data-i18n="nav.langDe"></button>
            <span aria-hidden="true">|</span>
            <button type="button" data-set-lang="en" aria-pressed="false" data-i18n="nav.langEn"></button>
          </div>
        </nav>
      </div>
    </header>

    <main id="main">
      <h1 class="page-title reveal" data-i18n="aboutPage.title"></h1>
      <p class="lede reveal" data-i18n="aboutPage.intro"></p>

      <section class="section" aria-labelledby="bg-heading">
        <h2 id="bg-heading" class="reveal" data-i18n="aboutPage.backgroundHeading"></h2>
        <p class="reveal" data-i18n="aboutPage.background"></p>
        <p class="section__continue reveal">
          <a href="cv.html" data-i18n="aboutPage.cvLink"></a>
        </p>
      </section>

      <section class="section" aria-labelledby="skills-heading">
        <h2 id="skills-heading" class="reveal" data-i18n="aboutPage.skillsHeading"></h2>
        <p class="reveal" data-i18n="aboutPage.skills"></p>
      </section>

      <section class="section" aria-labelledby="mot-heading">
        <h2 id="mot-heading" class="reveal" data-i18n="aboutPage.motivationHeading"></h2>
        <p class="reveal" data-i18n="aboutPage.motivation"></p>
      </section>

    </main>

    <footer class="site-footer">
      <div class="site-footer__inner">
        <p data-i18n="footer.note"></p>
        <p class="site-footer__legal">
          <a href="impressum.html" data-i18n="footer.impressumLink"></a>
        </p>
      </div>
    </footer>

    <script src="script.js" defer></script>
  </body>
</html>
